name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY_NAME: eventmgmtacrsadeesha.azurecr.io
  RESOURCE_GROUP: event-management-rg
  CONTAINER_APP_ENV: event-app-env

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Check free disk space before build
        run: df -h

      - name: Build and Push Microservices
        run: |
          declare -A services=(
            ["backend/config-server"]="config-server"
            ["backend/eureka-server"]="eureka-server"
            ["backend/api-gateway"]="api-gateway"
            ["backend/auth-service"]="auth-service"
            ["backend/event-service"]="event-service"
            ["backend/ticket-service"]="ticket-service"
            ["backend/notification-service"]="notification-service"
            ["backend/analytics-service"]="analytics-service"
            ["backend/review-service"]="review-service"
            ["backend/payment-service"]="payment-service"
            ["backend/admin-service"]="admin-service"
            ["backend/profile-service"]="profile-service"
            ["frontend"]="frontend"
          )

          for dir in "${!services[@]}"; do
            tag_name="${services[$dir]}"
            echo "--- Building $tag_name from $dir ---"
            docker build -t ${{ env.REGISTRY_NAME }}/${tag_name}:${{ github.sha }} -t ${{ env.REGISTRY_NAME }}/${tag_name}:latest ./${dir}
            
            echo "--- Pushing $tag_name ---"
            docker push ${{ env.REGISTRY_NAME }}/${tag_name}:${{ github.sha }}
            docker push ${{ env.REGISTRY_NAME }}/${tag_name}:latest
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          # PostgreSQL Configuration for Services
          DB_HOST="${{ secrets.DB_HOST }}"
          DB_USER="${{ secrets.DB_USER }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          
          # Notification Service Email Configuration
          NOTIFICATION_MAIL_USERNAME="${{ secrets.NOTIFICATION_MAIL_USERNAME }}"
          NOTIFICATION_MAIL_PASSWORD="${{ secrets.NOTIFICATION_MAIL_PASSWORD }}"
          
          # Payment Service Configuration
          PAYHERE_MERCHANT_ID="${{ secrets.PAYHERE_MERCHANT_ID }}"
          PAYHERE_MERCHANT_SECRET="${{ secrets.PAYHERE_MERCHANT_SECRET }}"
          
          # Frontend URL for PayHere callbacks
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          BACKEND_API_URL="${{ secrets.BACKEND_API_URL }}"

          # Service configuration: service_name:port:schema:has_database:min_replicas:cpu:memory
          # min_replicas=1 keeps containers WARM — eliminates cold-start delays (15-30s)
          # Critical path services (gateway, auth, event, ticket, profile) use min=1
          declare -A services=(
            ["config-server"]="8888::false:1:0.25:0.5Gi"
            ["eureka-server"]="8761::false:1:0.25:0.5Gi"
            ["api-gateway"]="8080::false:1:0.5:1.0Gi"
            ["auth-service"]="8082:auth_schema:true:1:0.5:1.0Gi"
            ["profile-service"]="8088:profile_schema:true:1:0.5:1.0Gi"
            ["event-service"]="8081:event_schema:true:1:0.5:1.0Gi"
            ["ticket-service"]="8084:ticket_schema:true:1:0.5:1.0Gi"
            ["notification-service"]="8085:notification_schema:true:1:0.25:0.5Gi"
            ["analytics-service"]="8086:analytics_schema:true:1:0.25:0.5Gi"
            ["review-service"]="8089:review_schema:true:1:0.25:0.5Gi"
            ["payment-service"]="8083:payment_schema:true:1:0.5:1.0Gi"
            ["admin-service"]="8087:admin_schema:true:1:0.25:0.5Gi"
            ["frontend"]="3000::false:1:0.25:0.5Gi"
          )

          for service in "${!services[@]}"; do
            echo "Updating Azure Container App: ${service}..."
            
            # Check if container app exists first
            if ! az containerapp show -n ${service} -g ${{ env.RESOURCE_GROUP }} &> /dev/null; then
              echo "⚠️  Container app ${service} not found. Skipping update..."
              continue
            fi
            
            config="${services[$service]}"
            IFS=':' read -r port schema has_database min_replicas cpu memory <<< "$config"
            
            # Build environment variables for this service
            ENV_VARS=""
            
            # Database services need PostgreSQL credentials
            if [ "$has_database" = "true" ]; then
              DB_URL="jdbc:postgresql://${DB_HOST}:5432/postgres?currentSchema=${schema}&sslmode=require"
              ENV_VARS="SPRING_DATASOURCE_URL=${DB_URL} SPRING_DATASOURCE_USERNAME=${DB_USER} SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}"
            fi
            
            # Service-specific configurations
            case "${service}" in
              "api-gateway")
                # Set service URLs for API Gateway to communicate with other services in Azure Container Apps
                ENV_VARS="${ENV_VARS} AUTH_SERVICE_URL=http://auth-service"
                ENV_VARS="${ENV_VARS} EVENT_SERVICE_URL=http://event-service"
                ENV_VARS="${ENV_VARS} TICKET_SERVICE_URL=http://ticket-service"
                ENV_VARS="${ENV_VARS} NOTIFICATION_SERVICE_URL=http://notification-service"
                ENV_VARS="${ENV_VARS} PAYMENT_SERVICE_URL=http://payment-service"
                ENV_VARS="${ENV_VARS} PROFILE_SERVICE_URL=http://profile-service"
                ENV_VARS="${ENV_VARS} ANALYTICS_SERVICE_URL=http://analytics-service"
                ENV_VARS="${ENV_VARS} ADMIN_SERVICE_URL=http://admin-service"
                ENV_VARS="${ENV_VARS} REVIEW_SERVICE_URL=http://review-service"
                ;;
              "notification-service")
                ENV_VARS="${ENV_VARS} SPRING_MAIL_USERNAME=${NOTIFICATION_MAIL_USERNAME} SPRING_MAIL_PASSWORD=${NOTIFICATION_MAIL_PASSWORD}"
                # Add service URLs for inter-service communication
                ENV_VARS="${ENV_VARS} EVENT_SERVICE_URL=http://event-service"
                ENV_VARS="${ENV_VARS} TICKET_SERVICE_URL=http://ticket-service"
                ;;
              "ticket-service")
                # Add service URLs for ticket service
                ENV_VARS="${ENV_VARS} EVENT_SERVICE_URL=http://event-service"
                ENV_VARS="${ENV_VARS} NOTIFICATION_SERVICE_URL=http://notification-service"
                ;;
              "payment-service")
                ENV_VARS="${ENV_VARS} PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID} PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET}"
                if [ -n "$FRONTEND_URL" ]; then
                  ENV_VARS="${ENV_VARS} FRONTEND_URL=${FRONTEND_URL}"
                fi
                if [ -n "$BACKEND_API_URL" ]; then
                  ENV_VARS="${ENV_VARS} BACKEND_API_URL=${BACKEND_API_URL}"
                fi
                # Add ticket service URL for Azure Container Apps
                ENV_VARS="${ENV_VARS} TICKET_SERVICE_URL=http://ticket-service"
                ;;
            esac

            # Trim leading/trailing whitespace
            ENV_VARS=$(echo "$ENV_VARS" | xargs)
            
            # Common scale args — min-replicas 1 prevents cold starts
            SCALE_ARGS="--min-replicas ${min_replicas} --max-replicas 3"
            RESOURCE_ARGS="--cpu ${cpu} --memory ${memory}"

            if [ -n "$ENV_VARS" ]; then
              echo "  → Updating image, env vars, scale (min=${min_replicas}), resources (cpu=${cpu}, mem=${memory})..."
              az containerapp update \
                --name ${service} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }} \
                --set-env-vars $ENV_VARS \
                ${SCALE_ARGS} \
                ${RESOURCE_ARGS} \
                --output none
            else
              echo "  → Updating image, scale (min=${min_replicas}), resources (cpu=${cpu}, mem=${memory})..."
              az containerapp update \
                --name ${service} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }} \
                ${SCALE_ARGS} \
                ${RESOURCE_ARGS} \
                --output none
            fi
          done
          
          echo "========================================"
          echo "✅ All services deployed successfully!"
          echo "========================================"
