name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_NAME: mycr.azurecr.io
  RESOURCE_GROUP: event-management-rg
  CONTAINER_APP_ENV: event-app-env

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker Compose Build
        run: docker-compose build

      - name: Tag and Push Docker Images
        run: |
          services=(
            "config-server" "eureka-server" "api-gateway" 
            "auth-service" "event-service" "ticket-service" 
            "notification-service" "analytics-service" 
            "payment-service" "admin-service" "profile-service" "frontend"
          )
          for service in "${services[@]}"; do
            docker tag ${service} ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
            docker push ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          # Note: this requires your ACA setup beforehand. This is an example of updating the container images.
          az containerapp update -n event-service -g ${{ env.RESOURCE_GROUP }} --image ${{ env.REGISTRY_NAME }}/event-service:${{ github.sha }}
          az containerapp update -n api-gateway -g ${{ env.RESOURCE_GROUP }} --image ${{ env.REGISTRY_NAME }}/api-gateway:${{ github.sha }}
          az containerapp update -n frontend -g ${{ env.RESOURCE_GROUP }} --image ${{ env.REGISTRY_NAME }}/frontend:${{ github.sha }}
          # Repeat for other services as needed...
