name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_NAME: eventmgmtacr.azurecr.io
  RESOURCE_GROUP: event-management-rg
  CONTAINER_APP_ENV: event-app-env

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Tag with Docker Compose
        run: docker-compose build

      - name: Tag and Push Docker Images
        run: |
          services=(
            "api-gateway" "auth-service" "profile-service" 
            "event-service" "ticket-service" "notification-service" 
            "analytics-service" "review-service" "frontend"
          )
          for service in "${services[@]}"; do
            # docker-compose build creates images with 'event-management-system_<service>:latest' or similar. 
            # We assume the images are named <service>:latest or similar based on docker-compose.yml 
            # If docker-compose builds them as event-management-system-<service>, you must tag correctly.
            # Assuming docker-compose image names:
            docker tag ${service}:latest ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
            docker push ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
            
            # Tag as latest as well
            docker tag ${service}:latest ${{ env.REGISTRY_NAME }}/${service}:latest
            docker push ${{ env.REGISTRY_NAME }}/${service}:latest
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          services=(
            "api-gateway" "auth-service" "profile-service" 
            "event-service" "ticket-service" "notification-service" 
            "analytics-service" "review-service" "frontend"
          )
          for service in "${services[@]}"; do
            echo "Updating Azure Container App: ${service}..."
            az containerapp update \
              --name ${service} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
          done
