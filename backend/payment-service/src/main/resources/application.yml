server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://eventmgmt-pg-db.postgres.database.azure.com:5432/postgres?currentSchema=payment_schema&sslmode=require}
    driverClassName: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:postgresadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:EventManagement123!}
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: ${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:payment_schema}
        hbm2ddl:
          create_namespaces: true

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    fetchRegistry: ${EUREKA_CLIENT_FETCH_REGISTRY:false}
    registerWithEureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:false}
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

payhere:
  merchant-id: "1234081"
  merchant-secret: "MzQ3MjQ4MzE4NDkwNTE5MjM0MzMzMjYyOTM1ODQyMTI4NzQ5MjA1"
  sandbox: true
  return-url: ${FRONTEND_URL:http://localhost:3000}/payment/success
  cancel-url: ${FRONTEND_URL:http://localhost:3000}/attendee
  notify-url: ${BACKEND_API_URL:http://host.docker.internal:8080}/api/payment/notify

ticket-service:
  url: "http://ticket-service:8084"

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
