server:
  port: 8084

spring:
  application:
    name: ticket-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://eventmgmt-pg-db.postgres.database.azure.com:5432/postgres?currentSchema=ticket_schema&sslmode=require}
    driverClassName: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:postgresadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:EventManagement123!}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: ${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA:ticket_schema}
        hbm2ddl:
          create_namespaces: true

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
  instance:
    preferIpAddress: true

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Internal service URLs (overridden via env vars on Azure)
event-service:
  url: ${EVENT_SERVICE_URL:http://event-service:8081}

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}


