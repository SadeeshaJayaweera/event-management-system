server:
  port: 8084

spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:h2:file:/data/ticketdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

payhere:
  merchant-id: "1234081"
  merchant-secret: "MTY3Mzg3Njk1NTQ0NzA5OTU3MjczNjgzNjYxOTEzNTY0OTMwNTU="
  mode: sandbox

