server:
  port: 8080
  servlet:
    session:
      cookie:
        secure: false
        http-only: true
        same-site: lax

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
              - X-Requested-With
            exposedHeaders:
              - Authorization
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth(?<segment>/?.*), /api/auth$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**
          filters:
            - RewritePath=/api/events(?<segment>/?.*), /api/events$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: attendee-service
          uri: lb://attendee-service
          predicates:
            - Path=/api/attendees/**
          filters:
            - RewritePath=/api/attendees(?<segment>/?.*), /api/attendees$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/tickets/**
          filters:
            - RewritePath=/api/tickets(?<segment>/?.*), /api/tickets$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications(?<segment>/?.*), /api/notifications$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - RewritePath=/api/analytics(?<segment>/?.*), /api/analytics$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api/admin(?<segment>/?.*), /api/admin$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# JWT Configuration (must match auth-service secret)
jwt:
  secret: ${JWT_SECRET:bXlTZWNyZXRLZXkxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ=}
  expiration: ${JWT_EXPIRATION:86400000}

