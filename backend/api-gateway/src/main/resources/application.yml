server:
  port: 8080
  servlet:
    session:
      cookie:
        secure: false
        http-only: true
        same-site: lax

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:*}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
              - X-Requested-With
            exposedHeaders:
              - Authorization
            allowCredentials: false
            maxAge: 3600

      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8082}
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth(?<segment>/?.*), /api/auth${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: users-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>/?.*), /api/users${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://event-service:8081}
          predicates:
            - Path=/api/events/**
          filters:
            - RewritePath=/api/events(?<segment>/?.*), /api/events${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: ticket-service
          uri: ${TICKET_SERVICE_URL:http://ticket-service:8084}
          predicates:
            - Path=/api/tickets,/api/tickets/**
          filters:
            - RewritePath=/api/tickets(?<segment>/?.*), /api/tickets${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications(?<segment>/?.*), /api/notifications${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://analytics-service:8086}
          predicates:
            - Path=/api/analytics/**
          filters:
            - RewritePath=/api/analytics(?<segment>/?.*), /api/analytics${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://admin-service:8087}
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api/admin(?<segment>/?.*), /api/admin${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: profile-service
          uri: ${PROFILE_SERVICE_URL:http://profile-service:8088}
          predicates:
            - Path=/api/profiles/**
          filters:
            - RewritePath=/api/profiles(?<segment>/?.*), /api/profiles${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews,/api/reviews/**
          filters:
            - RewritePath=/api/reviews(?<segment>/?.*), /api/reviews$\{segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8083}
          predicates:
            - Path=/api/payment/**
          filters:
            - RewritePath=/api/payment(?<segment>/?.*), /api/payment${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://review-service:8089}
          predicates:
            - Path=/api/reviews/**
          filters:
            - RewritePath=/api/reviews(?<segment>/?.*), /api/reviews${segment}
            - AddResponseHeader=X-Content-Type-Options,nosniff
            - AddResponseHeader=X-Frame-Options,DENY
            - AddResponseHeader=X-XSS-Protection,1;mode=block

        - id: review-service-openapi
          uri: lb://review-service
          predicates:
            - Path=/v3/api-docs/review-service
          filters:
            - RewritePath=/v3/api-docs/review-service, /v3/api-docs

eureka:
  client:
    enabled: false
    fetch-registry: false
    register-with-eureka: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# JWT Configuration (must match auth-service secret)
jwt:
  secret: ${JWT_SECRET:bXlTZWNyZXRLZXkxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ=}
  expiration: ${JWT_EXPIRATION:86400000}

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
